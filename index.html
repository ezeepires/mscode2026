<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu site</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: Arial, Helvetica, sans-serif;
            
        }
    </style>
</head>

<body class="bg-[#39B8CB]">
    <header class="flex flex-row w-screen h-min justify-between items-center bg-[#018734] py-8 px-26 text-white gap-2">
        <h1 class="font-bold text-3xl text-[#F3CD18]">FIFA Figurinhas</h1>

        <nav>
            <ul class="flex gap-4 text-xl">
                <li class="hover:text-gray-400"><a href="">Inicio</a></li>
                <li class="hover:text-gray-400"><a href="">Produtos</a></li>
                <li class="hover:text-gray-400"><a href="">Categoria</a></li>
                <li class="hover:text-gray-400"><a href="">Contato</a></li>
            </ul>
        </nav>

        <form class="flex gap-2">
            <input class="bg-white py-2 px-4 outline-none text-black rounded-lg" type="search" name="search" id="search"
                placeholder="Buscar">
            <button class="font-semibold py-2 px-4 bg-[#F3CD18] text-black rounded-lg hover:bg-yellow-300">Buscar</button>
            <div class="flex items-center justify-center w-[10px] h-[10px]">
                <i class="fa-solid fa-cart-shopping" style="color: #FFDF20;"></i>
            </div>
        </form>
    </header>

    <main class="flex flex-col w-screen items-center align-center text-center justify-center text-3xl p-6">
        <section class="font-semibold flex flex-col">
            <h2 class="p-6 text-yellow-300 text-shadow-lg text-yellow-red-600 text-4xl">Bem-vindo a nossa loja!</h2>
            <div class="flex justify-center gap-6 p-12 w-350 bg-[#018734] rounded-xl shadow-lg">
                <img class="rounded-xl shadow-lg" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRmCHVmuAiqwVEocVkXKtoWO_jxS6mgXzlcZA&s" alt="Foto do Neymar">
                <img class="rounded-xl shadow-lg" src="https://images.tcdn.com.br/img/img_prod/1457323/figurinha_neymar_jr_copa_do_mundo_2026_1_20260529152823_f4de412dd78c.png" alt="Foto do Neymar">
                <img class="rounded-xl shadow-lg" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRXAIVNvwE54U0JrORzHO2pqykmoh55jXVGdw&s" alt="Foto do Endrick">
            </div>
        </section>

        <section id="categorias">
            <h2></h2>
            <ul>
                <li></li>
                <li></li>
                <li></li>
                <li></li>
            </ul>
        </section>

        
    </main>
    
</body>

</html>
